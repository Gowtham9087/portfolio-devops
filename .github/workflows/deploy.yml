name: Build & Deploy Portfolio

on:
  push:
    branches: [main]       # Runs on every push to main
  pull_request:
    branches: [main]       # Also runs on PRs to catch errors before merge

jobs:

  # ── Job 1: Build & Test ──────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'              # Caches node_modules between runs

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci --frozen-lockfile

      # 4. Build the Vite app — fails pipeline if build breaks
      - name: Build
        run: npm run build

      # 5. Upload dist as artifact — next job can download it
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 2: Docker Build ──────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build              # Only runs if build job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image to verify it works
      - name: Build Docker image
        run: docker build -t portfolio:${{ github.sha }} .

      # Print image size — good to track over time
      - name: Show image size
        run: docker image inspect portfolio:${{ github.sha }} --format='Image size: {{.Size}} bytes'

  # ── Job 3: Deploy to Vercel ──────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build              # Only deploys if build passes
    if: github.ref == 'refs/heads/main'   # Only deploys on main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}